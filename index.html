<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'https://fggfjzlsgkjiumtqkikc.supabase.co';
const supabaseKey = 'sb_publishable_7F2c8tdKOrFnmQ_-x3uK3g_wpFcK7Yq';

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

const symbols = ['🍒','💎','7️⃣','🔥','⚡','🎰'];

const reels = [
  document.getElementById('reel1'),
  document.getElementById('reel2'),
  document.getElementById('reel3')
];

let coins = 1000;
let currentBet = 10;
let spinning = false;
let muted = false;

const spinSound = document.getElementById('spinSound');
const winSound = document.getElementById('winSound');

spinSound.volume = 0.5;
winSound.volume = 0.5;

function startGame(lang){

  console.log('Start game:', lang);

  const languageScreen = document.getElementById('languageScreen');
  const casino = document.getElementById('casino');

  if(languageScreen){
    languageScreen.remove();
  }

  if(casino){
    casino.style.display = 'block';
    casino.style.visibility = 'visible';
    casino.style.opacity = '1';
  }

  document.body.style.overflow = 'auto';
}


function updateCoins(){
  document.getElementById('coins').textContent = coins;
  document.getElementById('bet').textContent = currentBet;
}

function setBet(amount){

  if(amount === 'max'){
    currentBet = Math.min(coins,500);
  }else{
    currentBet = amount;
  }

  function createFallingCoins(){

  const bg=document.getElementById('coinsBg');

  for(let i=0;i<25;i++){

    const coin=document.createElement('div');

    coin.className='coin';
    coin.innerHTML='🪙';

    coin.style.left=Math.random()*100+'vw';
    coin.style.animationDuration=(Math.random()*6+6)+'s';
    coin.style.fontSize=(Math.random()*30+20)+'px';
    coin.style.opacity=Math.random()*0.5+0.3;
    coin.style.animationDelay=Math.random()*5+'s';

    bg.appendChild(coin);
  }
}

document.addEventListener('DOMContentLoaded', () => {

  const deBtn = document.getElementById('deBtn');
  const enBtn = document.getElementById('enBtn');

  if(deBtn){
    deBtn.addEventListener('click', () => startGame('de'));
  }

  if(enBtn){
    enBtn.addEventListener('click', () => startGame('en'));
  }

});

createFallingCoins();

updateCoins();
}

function createReel(reel){

  reel.innerHTML='';

  for(let i=0;i<24;i++){

    const symbol=document.createElement('div');

    symbol.className='symbol';

    symbol.textContent=
      symbols[Math.floor(Math.random()*symbols.length)];

    reel.appendChild(symbol);
  }
}

reels.forEach(createReel);

function addHistory(text,won){

  const history=document.getElementById('history');

  const item=document.createElement('div');

  item.className='history-item';

  if(won){
    item.innerHTML=`<strong style="color:#22c55e">${text}</strong>`;
  }else{
    item.innerHTML=`<span style="color:#9ca3af">${text}</span>`;
  }

  history.prepend(item);

  if(history.children.length>5){
    history.removeChild(history.lastChild);
  }
}

function spin(){

  if(spinning) return;

  if(coins < currentBet){
    document.getElementById('result').textContent='Not enough coins';
    return;
  }

  spinSound.currentTime = 0;
  spinSound.play();

  coins -= currentBet;

  updateCoins();

  spinning = true;

  const resultBox=document.getElementById('result');

  resultBox.classList.remove('winner');
  resultBox.textContent='Spinning...';

  let results=[];

  reels.forEach((reel,index)=>{

    createReel(reel);

    let finalIndex=Math.floor(Math.random()*symbols.length);

    if(Math.random()<0.18 && results.length>0){
      finalIndex=symbols.indexOf(results[0]);
    }

    results.push(symbols[finalIndex]);

    const stopPosition=(18+finalIndex)*180;

    reel.style.transition='none';
    reel.style.transform='translateY(0px)';

    setTimeout(()=>{
      reel.style.transition=`transform ${3+index*0.5}s cubic-bezier(.17,.67,.15,1)`;
      reel.style.transform=`translateY(-${stopPosition}px)`;
    },50);
  });

  setTimeout(()=>{

    let reward=0;
    let win=false;

    if(results[0]===results[1] && results[1]===results[2]){

      reward=currentBet*5;
      coins += reward;
      win=true;

      resultBox.textContent=`🔥 JACKPOT +${reward}`;
      resultBox.classList.add('winner');

      winSound.currentTime=0;
      winSound.play();

      launchConfetti();

    }else if(
      results[0]===results[1] ||
      results[1]===results[2] ||
      results[0]===results[2]
    ){

      reward=currentBet*2;
      coins += reward;
      win=true;

      resultBox.textContent=`✨ WIN +${reward}`;
      resultBox.classList.add('winner');

    }else{

      resultBox.textContent=results.join(' ');
    }

    addHistory(
      `${results.join(' ')} | Bet ${currentBet} | ${win ? '+'+reward : '-'+currentBet}`,
      win
    );

    updateCoins();

    spinning=false;

  },5000);
}

function toggleSound(){

  muted=!muted;

  const volume=muted ? 0 : 0.5;

  spinSound.volume=volume;
  winSound.volume=volume;

  document.getElementById('soundBtn').textContent=
    muted ? '🔇 Muted' : '🔊 Sound';
}

async function register(){

  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  alert('Registrierung erfolgreich');
}

async function login(){

  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  alert('Login erfolgreich');
}

async function logout(){

  await supabase.auth.signOut();

  alert('Ausgeloggt');
}

function launchConfetti(){

  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let confetti=[];

  for(let i=0;i<120;i++){

    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*6+2
    });
  }

  let frame=0;

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    confetti.forEach(p=>{

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
      ctx.fill();

      p.y += 3;
    });

    frame++;

    if(frame<180){
      requestAnimationFrame(draw);
    }
  }

  draw();
}

updateCoins();
</script>

</body>
