<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>casino0 – Slots Demo</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111a2b; --line:#22304d;
      --text:#e6edf3; --muted:#9fb0c3;
      --accent:#1f6feb; --accent2:#6e40c9;
      --win:#2ea043; --lose:#f85149; --warn:#f0883e;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{margin:0;background:var(--bg);color:var(--text);}
    header{
      padding:28px 16px; text-align:center;
      background: linear-gradient(120deg,var(--accent),var(--accent2));
      box-shadow: var(--shadow);
    }
    header h1{margin:0 0 6px;font-size:26px;}
    header p{margin:0;opacity:.9}

    main{max-width:1100px;margin:0 auto;padding:16px;}
    .grid{display:grid;gap:14px;grid-template-columns:1fr;}
    @media (min-width: 980px){ .grid{grid-template-columns: 1.35fr .65fr;} }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow: var(--shadow);
    }
    .topbar{
      display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
      margin-bottom:12px;
    }
    .lang button{
      background:transparent; color:var(--text);
      border:1px solid rgba(230,237,243,.25);
      border-radius:12px; padding:8px 10px; cursor:pointer;
      font-weight:700;
    }
    .lang button.active{border-color:rgba(230,237,243,.9);}

    .stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .pill{
      border:1px solid rgba(230,237,243,.18);
      border-radius:999px;
      padding:8px 12px;
      background: rgba(0,0,0,.18);
      font-weight:800;
      display:flex; gap:8px; align-items:baseline;
    }
    .pill small{color:var(--muted);font-weight:600}
    .pill span{font-variant-numeric: tabular-nums;}

    .slotArea{display:grid;gap:12px;}
    .reels{
      display:grid; gap:10px; grid-template-columns:repeat(3,1fr);
      padding:14px; border-radius:18px;
      background: radial-gradient(1200px 200px at 50% 0%, rgba(121,192,255,.25), transparent 60%),
                  linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.15));
      border:1px solid rgba(230,237,243,.14);
    }
    .reel{
      height:120px;
      display:flex; align-items:center; justify-content:center;
      font-size:56px;
      border-radius:16px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(230,237,243,.14);
      position:relative; overflow:hidden;
      user-select:none;
    }
    .reel::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), transparent 35%, transparent 65%, rgba(0,0,0,.22));
      pointer-events:none;
    }

    .controls{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
    }
    .controls .left, .controls .right{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

    select, input[type="range"]{
      background: rgba(0,0,0,.18);
      color: var(--text);
      border: 1px solid rgba(230,237,243,.18);
      border-radius: 12px;
      padding: 10px 10px;
      outline: none;
    }

    button{
      cursor:pointer;
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      letter-spacing:.2px;
    }
    .primary{background:var(--accent);color:white;min-width:140px;}
    .primary:disabled{opacity:.55;cursor:not-allowed;}
    .ghost{background:transparent;color:var(--text);border:1px solid rgba(230,237,243,.22);}
    .danger{background:rgba(248,81,73,.16);color:var(--text);border:1px solid rgba(248,81,73,.35);}
    .toggle{
      display:flex; gap:8px; align-items:center;
      border:1px solid rgba(230,237,243,.18);
      border-radius:14px;
      padding:10px 12px;
      background: rgba(0,0,0,.18);
      user-select:none;
      font-weight:800;
    }
    .toggle input{transform:scale(1.1);}

    .msg{
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(230,237,243,.16);
      background: rgba(0,0,0,.16);
      line-height:1.35;
    }
    .msg.win{border-color: rgba(46,160,67,.6); background: rgba(46,160,67,.12);}
