<body>

  <div id="languageScreen" class="language-screen">
    <div class="language-box">
      <h1>Choose Language</h1>

        <button onclick="startGame('de')">🇩🇪 Deutsch</button>
        <button onclick="startGame('en')">🇬🇧 English</button>
      </div>
    </div>
  </div>

  <canvas id="confetti"></canvas>

  <!-- Casino Sounds -->
  <audio id="spinSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
  </audio>

  <audio id="winSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
  </audio>

  <audio id="bgMusic" autoplay loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3" type="audio/mpeg">
  </audio>

  <div class="casino" id="casino" style="display:none;">

    <div class="topbar">
      <div class="logo">🎰 NEON CASINO</div>

      <div class="top-actions">
        <button class="auth-btn">Login</button>
        <button class="auth-btn register">Register</button>
      </div>

      <div class="coins-display">
        🪙 <span id="coins">1000</span>
      </div>
    </div>

    <h1 id="title">Neon Spin</h1>
    <p class="subtitle" id="subtitle">Ultra Animated GitHub Casino Style</p>

    <div class="slot-machine">
      <div class="slot">
        <div class="reel" id="reel1"></div>
      </div>

      <div class="slot">
        <div class="reel" id="reel2"></div>
      </div>

      <div class="slot">
        <div class="reel" id="reel3"></div>
      </div>
    </div>

    <div class="bet-controls">
      <button onclick="setBet(10)">10</button>
      <button onclick="setBet(25)">25</button>
      <button onclick="setBet(100)">100</button>
      <button onclick="setBet('max')">MAX</button>
    </div>

    <div class="current-bet">
      Bet: <span id="bet">10</span>
    </div>

    <button class="spin-btn" onclick="spin()">
      <span id="spinText">SPIN</span>
    </button>

    <div class="result" id="result"></div>

    <div class="history-box">
      <h3 id="historyTitle">Last Spins</h3>
      <div id="history"></div>
    </div>

  </div>

  <script>
    const symbols = ["🍒", "💎", "7️⃣", "🔥", "⚡", "🎰"];

    const reels = [
      document.getElementById("reel1"),
      document.getElementById("reel2"),
      document.getElementById("reel3")
    ];

    let lang = 'en';
    let coins = 1000;
    let currentBet = 10;
    let spinning = false;

    const translations = {
      de: {
        title: 'Neon Spin',
        subtitle: 'Animiertes Casino Spin Game',
        spin: 'DREHEN',
        history: 'Letzte Spins',
        jackpot: '🔥 JACKPOT 🔥',
        noCoins: 'Nicht genug Coins',
        spinning: 'Dreht...'
      },
      en: {
        title: 'Neon Spin',
        subtitle: 'Animated Casino Spin Game',
        spin: 'SPIN',
        history: 'Last Spins',
        jackpot: '🔥 JACKPOT 🔥',
        noCoins: 'Not enough coins',
        spinning: 'Spinning...'
      }
    };

    function startGame(selectedLang) {
      lang = selectedLang;

      document.getElementById('languageScreen').style.display = 'none';
      document.getElementById('casino').style.display = 'block';

      const t = translations[lang];

      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('spinText').textContent = t.spin;
      document.getElementById('historyTitle').textContent = t.history;
    }

    function updateCoins() {
      document.getElementById('coins').textContent = coins;
      document.getElementById('bet').textContent = currentBet;
    }

    function setBet(amount) {
      if (amount === 'max') {
        currentBet = Math.min(coins, 500);
      } else {
        currentBet = amount;
      }

      // Browser erlauben Audio erst nach User Interaction
    document.body.addEventListener('click', () => {
      const music = document.getElementById('bgMusic');

      music.volume = 0.25;

      music.play().catch(() => {});
    }, { once: true });

    updateCoins();
    }

    function createReel(reel) {
      reel.innerHTML = '';

      for (let i = 0; i < 24; i++) {
        const symbol = document.createElement('div');
        symbol.className = 'symbol';
        symbol.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        reel.appendChild(symbol);
      }
    }

    reels.forEach(createReel);

    function addHistory(text, won) {
      const history = document.getElementById('history');

      const item = document.createElement('div');
      item.className = 'history-item';

      if (won) {
        item.innerHTML = `<strong style="color:#22c55e">${text}</strong>`;
      } else {
        item.innerHTML = `<span style="color:#9ca3af">${text}</span>`;
      }

      history.prepend(item);

      if (history.children.length > 5) {
        history.removeChild(history.lastChild);
      }
    }
    }

    function spin() {
      document.getElementById('spinSound').currentTime = 0;
      document.getElementById('spinSound').play();
      if (spinning) return;

      const t = translations[lang];

      if (coins < currentBet) {
        document.getElementById('result').textContent = t.noCoins;
        return;
      }

      coins -= currentBet;
      updateCoins();

      spinning = true;

      const resultBox = document.getElementById('result');
      resultBox.classList.remove('winner');
      resultBox.textContent = t.spinning;

      let results = [];

      reels.forEach((reel, index) => {
        createReel(reel);

        const finalIndex = Math.floor(Math.random() * symbols.length);
        results.push(symbols[finalIndex]);

        const stopPosition = (18 + finalIndex) * 180;

        reel.style.transition = 'none';
        reel.style.transform = 'translateY(0px)';

        setTimeout(() => {
          reel.style.transition = `transform ${3 + index * 0.6}s cubic-bezier(.17,.67,.15,1)`;
          reel.style.transform = `translateY(-${stopPosition}px)`;
        }, 50);
      });

      setTimeout(() => {
        let reward = 0;
        let win = false;

        if (results[0] === results[1] && results[1] === results[2]) {
          reward = currentBet * 5;
          win = true;

          coins += reward;

          resultBox.textContent = `${t.jackpot} +${reward}`;
          resultBox.classList.add('winner');

          launchConfetti();
          document.getElementById('winSound').currentTime = 0;
          document.getElementById('winSound').play();

        } else if (
          results[0] === results[1] ||
          results[1] === results[2] ||
          results[0] === results[2]
        ) {
          reward = currentBet * 2;
          win = true;

          coins += reward;

          resultBox.textContent = `✨ +${reward} Coins ✨`;

        } else {
          resultBox.textContent = results.join(' ');
        }

        addHistory(`${results.join(' ')} | Bet ${currentBet} | ${win ? '+' + reward : '-'+currentBet}`, win);

        updateCoins();
        spinning = false;
      }, 5200);
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];

      for (let i = 0; i < 150; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 150
        });
      }

      let frame = 0;

      function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
          ctx.fill();
        });

        update();
      }

      function update() {
        pieces.forEach(p => {
          p.y += Math.cos(frame + p.d) + 3 + p.r / 2;
          p.x += Math.sin(frame) * 2;
        });

        frame += 0.01;
      }

      function animate() {
        draw();

        if (frame < 6) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0,0,canvas.width,canvas.height);
        }
      }

      animate();
    }

    updateCoins();
  </script>
</body>
</html>
