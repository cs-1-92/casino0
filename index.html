# Fixed index.html

```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Casino</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#1a1200,#ffd700);
  overflow:hidden;
  color:white;
}

.coins-bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.coin{
  position:absolute;
  top:-50px;
  font-size:30px;
  animation:fall linear infinite;
}

@keyframes fall{
  from{
    transform:translateY(-100px) rotate(0deg);
  }
  to{
    transform:translateY(120vh) rotate(360deg);
  }
}

.language-screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.8);
  z-index:999;
}

.language-box{
  background:#222;
  padding:40px;
  border-radius:20px;
  text-align:center;
}

.language-box button{
  padding:15px 30px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#casino{
  display:none;
  padding:30px;
}

h1{
  text-align:center;
}

.slot-machine{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.slot{
  width:120px;
  height:120px;
  background:#111;
  border:3px solid gold;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
}

.spin-btn{
  display:block;
  margin:40px auto;
  padding:20px 60px;
  font-size:30px;
  border:none;
  border-radius:20px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

#result{
  text-align:center;
  font-size:30px;
}

</style>
</head>
<body>

<div class="coins-bg" id="coinsBg"></div>

<div class="language-screen" id="languageScreen">
  <div class="language-box">
    <h1>Select Language</h1>

    <button id="deBtn">🇩🇪 Deutsch</button>
    <button id="enBtn">🇬🇧 English</button>
  </div>
</div>

<div id="casino">

<h1>🎰 Neon Casino</h1>

<h2 style="text-align:center;">
Coins: <span id="coins">1000</span>
</h2>

<div class="slot-machine">
  <div class="slot" id="slot1">🍒</div>
  <div class="slot" id="slot2">💎</div>
  <div class="slot" id="slot3">7️⃣</div>
</div>

<button class="spin-btn" onclick="spin()">
SPIN
</button>

<div id="result"></div>

</div>

<script>

const symbols = ['🍒','💎','7️⃣','🔥','⚡','🎰'];

let coins = 1000;

function createCoins(){

  const bg = document.getElementById('coinsBg');

  for(let i=0;i<25;i++){

    const coin = document.createElement('div');

    coin.className = 'coin';
    coin.innerHTML = '🪙';

    coin.style.left = Math.random()*100 + 'vw';
    coin.style.animationDuration = (Math.random()*5+5)+'s';
    coin.style.animationDelay = Math.random()*5+'s';

    bg.appendChild(coin);
  }
}

window.onload = function(){

  createCoins();

  const deBtn = document.getElementById('deBtn');
  const enBtn = document.getElementById('enBtn');

  deBtn.onclick = openCasino;
  enBtn.onclick = openCasino;
};

function openCasino(){

  document.getElementById('languageScreen').style.display='none';

  document.getElementById('casino').style.display='block';
}

function spin(){

  const slot1 = document.getElementById('slot1');
  const slot2 = document.getElementById('slot2');
  const slot3 = document.getElementById('slot3');

  slot1.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
  slot2.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
  slot3.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];

  const a = slot1.innerHTML;
  const b = slot2.innerHTML;
  const c = slot3.innerHTML;

  let reward = 0;

  if(a===b && b===c){
    reward = 100;
  }else if(a===b || b===c || a===c){
    reward = 20;
  }else{
    reward = -10;
  }

  coins += reward;

  document.getElementById('coins').innerHTML = coins;

  if(reward > 0){
    document.getElementById('result').innerHTML = 'WIN +' + reward;
  }else{
    document.getElementById('result').innerHTML = 'LOSE ' + reward;
  }
}

</script>

</body>
</html>
